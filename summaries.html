<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="浏览、搜索并阅读 Java 与 Scala 课程总结。" />
  <title>课程总结资料馆 - Scala Learn</title>
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="library-header">
    <nav class="top-nav compact">
      <a class="brand" href="index.html">Scala Learn</a>
      <div class="nav-links">
        <a href="index.html#lessons">互动课程</a>
        <a href="summaries.html" aria-current="page">课程总结</a>
        <a href="index.html#games">Java练习</a>
      </div>
    </nav>
    <div class="container library-title-wrap">
      <p class="eyebrow">Course Summary Library</p>
      <h1>课程总结资料馆</h1>
      <p class="hero-text">集中阅读 21 篇 Scala 与 19 篇 Java 课程总结。可以按语言筛选，也可以搜索知识点、标题、日期或课程序号。</p>
    </div>
  </header>

  <main class="container library-main">
    <section class="filters panel summary-filters" aria-labelledby="summaryFiltersTitle">
      <h2 class="sr-only" id="summaryFiltersTitle">筛选课程总结</h2>
      <label class="filter-item">
        <span>关键词搜索</span>
        <input id="summarySearch" type="search" placeholder="输入 ArrayBuffer、接口、继承、03……" />
      </label>
      <label class="filter-item">
        <span>课程语言</span>
        <select id="summaryLanguage">
          <option value="all">全部语言</option>
          <option value="Scala">Scala</option>
          <option value="Java">Java</option>
        </select>
      </label>
      <button class="btn small" id="resetSummaryFilters" type="button">重置筛选</button>
    </section>
    <p class="result-info" id="summaryResultStatus" role="status" aria-live="polite">正在加载课程总结……</p>
    <section class="summary-grid" id="summaryGrid" aria-label="课程总结列表"></section>
  </main>

  <footer class="site-footer"><p>课程总结来自项目内的 Markdown 源文件，并自动生成静态 HTML。</p></footer>
  <script src="js/summaries-data.js"></script>
  <script type="module" src="js/summaries.js"></script>
</body>
</html>
